    document.getElementById('scrollArea').innerHTML = `

  function updateFavBtn() {
    const btn = document.getElementById('favBtn')
    const nav = document.getElementById('navFav')
    if (isFav) {
      btn.innerHTML = '❤️ រក្សាទុករួចហើយ'
      btn.style.background = 'linear-gradient(135deg,#C84040 0%,#A82020 55%,#8A1010 100%)'
      btn.style.boxShadow  = '0 4px 0 #6A0808,0 6px 16px rgba(120,20,20,0.28)'
      nav.textContent = '❤️'
    } else {
      btn.innerHTML = '🤍 បន្ថែមទៅចូលចិត្ត'
      btn.style.background = 'linear-gradient(135deg,#C89A3A 0%,#A87820 55%,#8A6010 100%)'
      btn.style.boxShadow  = '0 4px 0 #6A4808,0 6px 16px rgba(120,80,10,0.28)'
      nav.textContent = '🤍'
    }
  }

  function toggleFav() {
    if (!item) return
    isFav = !isFav
    if (isFav) favorites.push(item.id)
    else favorites = favorites.filter(f => f !== item.id)
    localStorage.setItem('bk_favorites', JSON.stringify(favorites))
    updateFavBtn()
  }

  render()
</script>
